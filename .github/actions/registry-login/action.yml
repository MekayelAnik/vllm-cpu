name: Registry Login
description: Login to Docker Hub and GitHub Container Registry

inputs:
  dockerhub_username:
    description: Docker Hub username
    required: false
    default: ''
  dockerhub_token:
    description: Docker Hub access token
    required: false
    default: ''
  ghcr_actor:
    description: GitHub actor for GHCR login
    required: false
    default: ''
  ghcr_token:
    description: GitHub token for GHCR login
    required: false
    default: ''
  push_to_dockerhub:
    description: Enable Docker Hub login
    required: false
    default: 'true'
  push_to_ghcr:
    description: Enable GHCR login
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Login to Docker Hub
      if: inputs.push_to_dockerhub != 'false'
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Login to GitHub Container Registry
      if: inputs.push_to_ghcr != 'false'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.ghcr_actor }}
        password: ${{ inputs.ghcr_token }}
