# =============================================================================
# monitor-pypi-releases.yml — vLLM CPU Docker Image Pipeline
# =============================================================================
# Monitors PyPI for new vllm-cpu wheel releases, then builds multi-arch Docker
# images (linux/amd64 + linux/arm64) and pushes to GHCR + Docker Hub.
#
# Triggered AFTER wheels are published to PyPI (via repository_dispatch from
# build-wheel.yml, or on schedule/manual trigger).
#
# Pipeline: Check PyPI → Fetch versions → Build Docker images → Promote latest/stable
#
# Based on codegraphcontext-mcp-docker/monitor-npm-releases.yml pattern.
# =============================================================================

name: vLLM CPU Docker Build Pipeline

on:
  # schedule:
  #   - cron: '35 */6 * * *'  # Every 6 hours at :35 (30 min after wheel check)
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        options:
          - auto-check
          - build
          - promote-latest
          - force-promote-latest
          - promote-stable
          - force-promote-stable
        default: auto-check
      versions:
        description: 'Versions to build. Comma-separated (0.17.0,0.18.0) or empty for auto from PyPI.'
        required: false
        type: string
        default: ''
      force_build:
        description: Force build even if tags may already exist
        required: false
        type: boolean
        default: false
      auto_promote:
        description: 'Automatically promote latest tag after build completes'
        required: false
        type: boolean
        default: false
      custom_latest:
        description: 'Override which version to promote as latest (leave empty for PyPI latest)'
        required: false
        type: string
        default: ''
      build_profile:
        description: Build profile
        required: false
        type: choice
        options:
          - production
          - ci
          - development
          - size-optimized
        default: production
      base_image:
        description: 'Base image override (example: python:3.13-slim)'
        required: false
        type: string
        default: ''
      build_branch:
        description: 'Branch to build from (default: main)'
        required: false
        type: string
        default: 'main'

  repository_dispatch:
    types: [vllm-cpu-docker-build]

permissions:
  contents: write
  actions: read
  packages: write

concurrency:
  group: vllm-cpu-docker-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || github.event_name == 'repository_dispatch' && (github.event.client_payload.action || 'external') || 'scheduled' }}
  cancel-in-progress: false

env:
  PYPI_PACKAGE: 'vllm-cpu'
  PYPI_REGISTRY: 'https://pypi.org'
  MIN_VERSION: '0.17.0'
  MAX_VERSIONS: '5'
  TZ: ${{ vars.TZ || 'Asia/Dhaka' }}
  PRIMARY_REGISTRY: 'ghcr'
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO || 'mekayelanik/vllm-cpu' }}
  GHCR_REPO: ${{ vars.GHCR_REPO || format('ghcr.io/{0}/vllm-cpu', github.repository_owner) }}
  DEFAULT_PLATFORMS: ${{ vars.DEFAULT_PLATFORMS || 'linux/amd64,linux/arm64' }}
  EXCLUDE_VERSIONS: ${{ vars.EXCLUDE_VERSIONS || '' }}
  BASE_IMAGE_DEFAULT: ${{ github.event.inputs.base_image || vars.BASE_IMAGE_DEFAULT || 'python:3.13-slim' }}
  EXPORT_CACHE_CONCURRENCY: '4'
  EXPORT_LAYERS_CONCURRENCY: '4'
  BUILDKIT_STEP_LOG_MAX_SIZE: '50000000'
  BUILDKIT_STEP_LOG_MAX_SPEED: '100000000'
  BUILDKIT_PROGRESS: 'plain'
  DOCKER_BUILDKIT_INLINE_CACHE: '1'

jobs:
  # ===========================================================================
  # Job 1: Quick check — skip if no new PyPI version
  # ===========================================================================
  quick-check:
    name: Check if pipeline run is needed
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Compare PyPI latest against stored state
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          CLIENT_FORCE_BUILD: ${{ github.event.client_payload.force_build || 'false' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          STATE_BRANCH="pipeline-state"
          STATE_FILE="state.json"

          # Manual triggers always run
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Manual trigger — running pipeline"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Repository dispatch (from wheel pipeline) always runs
          if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            echo "Repository dispatch — running pipeline"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check current PyPI latest version
          CURRENT_PYPI_LATEST="$(curl -fsSL "${PYPI_REGISTRY}/pypi/${PYPI_PACKAGE}/json" \
            | jq -r '.info.version // ""' 2>/dev/null || echo "")"

          if [[ -z "$CURRENT_PYPI_LATEST" ]]; then
            echo "Could not fetch PyPI latest — running pipeline as fallback"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PyPI latest: $CURRENT_PYPI_LATEST"

          # Read stored state from pipeline-state branch
          STORED_PYPI_LATEST=""
          STATE_JSON="$(gh api "repos/${REPO}/contents/${STATE_FILE}?ref=${STATE_BRANCH}" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")"
          if [[ -n "$STATE_JSON" ]]; then
            STORED_PYPI_LATEST="$(echo "$STATE_JSON" \
              | jq -r '.pypi_latest_version // ""' 2>/dev/null || echo "")"
          fi

          if [[ -z "$STORED_PYPI_LATEST" ]]; then
            echo "No stored PyPI version — first run, running pipeline"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$CURRENT_PYPI_LATEST" != "$STORED_PYPI_LATEST" ]]; then
            echo "PyPI latest changed: ${STORED_PYPI_LATEST} -> ${CURRENT_PYPI_LATEST} — running pipeline"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PyPI latest unchanged (${CURRENT_PYPI_LATEST}) — skipping pipeline"
          echo "should_run=false" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Job 2: Preflight checks
  # ===========================================================================
  preflight:
    name: Preflight checks
    needs: [quick-check]
    if: needs.quick-check.outputs.should_run == 'true'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.build_branch || github.event.client_payload.build_branch || 'main' }}

      - name: Validate workflow YAML
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import yaml
          from pathlib import Path

          workflow_dir = Path('.github/workflows')
          for wf in sorted(workflow_dir.glob('*.yml')):
              yaml.safe_load(wf.read_text(encoding='utf-8'))
          print('workflow_yaml_ok')
          PY

      - name: Run preflight shell tests
        uses: ./.github/actions/preflight-shell-tests

  # ===========================================================================
  # Job 3: Fetch and filter PyPI releases
  # ===========================================================================
  fetch-releases:
    name: Fetch and filter PyPI releases
    needs: [quick-check]
    if: needs.quick-check.outputs.should_run == 'true'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 10
    outputs:
      normalized_action: ${{ steps.normalize.outputs.action }}
      normalized_versions: ${{ steps.normalize.outputs.versions }}
      normalized_force_build: ${{ steps.normalize.outputs.force_build }}
      normalized_auto_promote: ${{ steps.normalize.outputs.auto_promote }}
      normalized_custom_latest: ${{ steps.normalize.outputs.custom_latest }}
      versions_json: ${{ steps.releases.outputs.versions_json }}
      latest_version: ${{ steps.normalize.outputs.custom_latest != '' && steps.normalize.outputs.custom_latest || steps.releases.outputs.latest_version }}
      date_tag: ${{ steps.releases.outputs.date_tag }}
      should_build: ${{ steps.releases.outputs.should_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.build_branch || github.event.client_payload.build_branch || 'main' }}

      - name: Normalize dispatch inputs
        id: normalize
        shell: bash
        env:
          ACTION_INPUT: ${{ github.event.inputs.action || '' }}
          CLIENT_ACTION: ${{ github.event.client_payload.action || '' }}
          VERSIONS_INPUT: ${{ github.event.inputs.versions || '' }}
          CLIENT_VERSIONS: ${{ github.event.client_payload.versions || '' }}
          FORCE_INPUT: ${{ github.event.inputs.force_build || '' }}
          CLIENT_FORCE: ${{ github.event.client_payload.force_build || '' }}
          AUTO_PROMOTE_INPUT: ${{ github.event.inputs.auto_promote || '' }}
          CLIENT_AUTO_PROMOTE: ${{ github.event.client_payload.auto_promote || '' }}
          CUSTOM_LATEST_INPUT: ${{ github.event.inputs.custom_latest || '' }}
          CLIENT_CUSTOM_LATEST: ${{ github.event.client_payload.custom_latest || '' }}
        run: |
          set -euo pipefail
          bash .github/scripts/normalize-dispatch-inputs.sh

      - name: Collect stable versions
        id: releases
        shell: bash
        env:
          REQUESTED_ACTION: ${{ steps.normalize.outputs.action }}
          MANUAL_VERSIONS_RAW: ${{ steps.normalize.outputs.versions }}
        run: |
          set -euo pipefail

          PYPI_PACKAGE="${PYPI_PACKAGE}" \
          PYPI_REGISTRY="${PYPI_REGISTRY}" \
          MAX_VERSIONS="${MAX_VERSIONS}" \
          MIN_VERSION="${MIN_VERSION}" \
          EXCLUDE_VERSIONS="${EXCLUDE_VERSIONS}" \
          bash .github/scripts/fetch-releases-pypi.sh

  # ===========================================================================
  # Job 4: Build Docker images via reusable workflow
  # ===========================================================================
  # Job 3b: Resolve base image with base-image-repo-test fallback
  # ===========================================================================
  resolve-base-image:
    name: Base image repo test
    needs: [quick-check]
    if: needs.quick-check.outputs.should_run == 'true'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 5
    outputs:
      base_image: ${{ steps.resolve.outputs.base_image }}
    steps:
      - name: Base image repo test
        id: resolve
        shell: bash
        env:
          PRIMARY_IMAGE: ${{ github.event.inputs.base_image || vars.BASE_IMAGE_DEFAULT || '' }}
          FALLBACK_IMAGE: 'python:3.13-slim'
        run: |
          set -euo pipefail

          if [[ -z "$PRIMARY_IMAGE" ]]; then
            echo "No primary image configured, using fallback: $FALLBACK_IMAGE"
            echo "base_image=$FALLBACK_IMAGE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Testing primary base image: $PRIMARY_IMAGE"
          if docker pull "$PRIMARY_IMAGE" --quiet 2>/dev/null; then
            echo "Primary base image available: $PRIMARY_IMAGE"
            echo "base_image=$PRIMARY_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Primary base image unreachable: $PRIMARY_IMAGE — falling back to $FALLBACK_IMAGE"
            echo "base_image=$FALLBACK_IMAGE" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  build-versions:
    name: Build selected versions
    needs: [preflight, fetch-releases, resolve-base-image]
    if: >-
      needs.fetch-releases.outputs.should_build == 'true' &&
      !startsWith(needs.fetch-releases.outputs.normalized_action, 'promote') &&
      !startsWith(needs.fetch-releases.outputs.normalized_action, 'force-promote')
    uses: ./.github/workflows/reusable-build-versions.yml
    with:
      versions_json: ${{ needs.fetch-releases.outputs.versions_json }}
      build_profile: ${{ github.event.inputs.build_profile || 'production' }}
      force_build: ${{ needs.fetch-releases.outputs.normalized_force_build }}
      base_image_default: ${{ needs.resolve-base-image.outputs.base_image }}
      ghcr_repo: ${{ vars.GHCR_REPO || format('ghcr.io/{0}/vllm-cpu', github.repository_owner) }}
      dockerhub_repo: ${{ vars.DOCKERHUB_REPO || 'mekayelanik/vllm-cpu' }}
      default_platforms: ${{ vars.DEFAULT_PLATFORMS || 'linux/amd64,linux/arm64' }}
      export_cache_concurrency: '4'
      export_layers_concurrency: '4'
      buildkit_step_log_max_size: '50000000'
      buildkit_step_log_max_speed: '100000000'
      buildkit_progress: 'plain'
      docker_buildkit_inline_cache: '1'
      runner_version: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ===========================================================================
  # Job 5: Promote latest/stable tags
  # ===========================================================================
  promote-latest:
    name: Promote latest tag
    needs: [quick-check, fetch-releases, build-versions]
    if: |
      always() &&
      (needs.fetch-releases.outputs.latest_version != '' || needs.fetch-releases.outputs.normalized_action == 'force-promote-latest') &&
      (
        needs.fetch-releases.outputs.normalized_action == 'promote-latest' ||
        needs.fetch-releases.outputs.normalized_action == 'force-promote-latest' ||
        needs.fetch-releases.outputs.normalized_action == 'promote-stable' ||
        needs.fetch-releases.outputs.normalized_action == 'force-promote-stable' ||
        (needs.build-versions.result == 'success' && needs.fetch-releases.outputs.normalized_auto_promote == 'true') ||
        (needs.build-versions.result == 'success' && contains(needs.fetch-releases.outputs.versions_json, needs.fetch-releases.outputs.latest_version)) ||
        needs.fetch-releases.outputs.normalized_action == 'auto-check'
      )
    uses: ./.github/workflows/reusable-promote-latest.yml
    with:
      latest_version: ${{ needs.fetch-releases.outputs.normalized_action == 'force-promote-latest' && needs.fetch-releases.outputs.normalized_versions != '' && needs.fetch-releases.outputs.normalized_versions || needs.fetch-releases.outputs.latest_version }}
      date_tag: ${{ needs.fetch-releases.outputs.date_tag }}
      ghcr_repo: ${{ vars.GHCR_REPO || format('ghcr.io/{0}/vllm-cpu', github.repository_owner) }}
      dockerhub_repo: ${{ vars.DOCKERHUB_REPO || 'mekayelanik/vllm-cpu' }}
      force_latest: ${{ needs.fetch-releases.outputs.normalized_action == 'force-promote-latest' }}
      force_stable: ${{ needs.fetch-releases.outputs.normalized_action == 'promote-stable' || needs.fetch-releases.outputs.normalized_action == 'force-promote-stable' }}
      runner_version: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ===========================================================================
  # Job 6: Update pipeline state
  # ===========================================================================
  update-state:
    name: Update pipeline state
    needs: [fetch-releases, promote-latest]
    if: |
      always() &&
      needs.fetch-releases.outputs.latest_version != '' &&
      (needs.promote-latest.result == 'success' || needs.promote-latest.result == 'skipped')
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 10
    steps:
      - name: Checkout state branch
        uses: actions/checkout@v6
        with:
          ref: pipeline-state
          fetch-depth: 1
        continue-on-error: true
        id: checkout-state

      - name: Initialize orphan branch if needed
        if: steps.checkout-state.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git init
          git checkout --orphan pipeline-state
          git reset --hard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" 2>/dev/null || true

      - name: Write and push state
        shell: bash
        env:
          LATEST: ${{ needs.fetch-releases.outputs.latest_version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ -z "$LATEST" ]]; then
            echo "No latest version to store"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Read existing state to preserve or reset latest_version_since
          EXISTING_VERSION=""
          EXISTING_SINCE=""
          if [[ -f state.json ]]; then
            EXISTING_VERSION="$(jq -r '.pypi_latest_version // ""' state.json)"
            EXISTING_SINCE="$(jq -r '.latest_version_since // ""' state.json)"
          fi

          # Determine latest_version_since
          if [[ "$LATEST" != "$EXISTING_VERSION" || -z "$EXISTING_SINCE" ]]; then
            SINCE="$NOW"
            echo "Version changed or first run — setting latest_version_since to $SINCE"
          else
            SINCE="$EXISTING_SINCE"
            echo "Version unchanged — preserving latest_version_since ($SINCE)"
          fi

          jq -n \
            --arg v "$LATEST" \
            --arg t "$NOW" \
            --arg s "$SINCE" \
            '{pypi_latest_version: $v, updated_at: $t, latest_version_since: $s}' > state.json

          git add state.json

          # Check if staged content differs from HEAD
          if git diff --cached --quiet 2>/dev/null; then
            echo "State unchanged — skipping commit"
            exit 0
          fi

          git commit -m "state: update pypi_latest_version to ${LATEST}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" HEAD:pipeline-state

  # ===========================================================================
  # Job 7: Update README version
  # ===========================================================================
  update-readme-version:
    name: Update README version
    needs: [fetch-releases, promote-latest]
    if: |
      needs.promote-latest.result == 'success' &&
      needs.fetch-releases.outputs.latest_version != ''
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ github.token }}

      - name: Update version in README
        shell: bash
        env:
          LATEST: ${{ needs.fetch-releases.outputs.latest_version }}
        run: |
          set -euo pipefail
          echo "Updating README to version $LATEST"

          # Update version references in README.md
          sed -i -E "s/vllm-cpu==[0-9]+\.[0-9]+\.[0-9]+[^ ]*/vllm-cpu==${LATEST}/" README.md
          sed -i -E "s/vllm-cpu:[0-9]+\.[0-9]+\.[0-9]+[^ ]*/vllm-cpu:${LATEST}/" README.md

          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update version to ${LATEST} in README"
          git push

  # ===========================================================================
  # Job 8: Sync README to Docker Hub
  # ===========================================================================
  update-dockerhub-description:
    name: Update Docker Hub description
    needs: [promote-latest, update-readme-version]
    if: |
      always() &&
      needs.promote-latest.result == 'success'
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_REPO || 'mekayelanik/vllm-cpu' }}
          readme-filepath: ./README.md
