name: Reusable Build Versions

on:
  workflow_call:
    inputs:
      versions_json:
        description: JSON matrix include payload for versions
        required: true
        type: string
      build_profile:
        description: Build profile
        required: false
        type: string
        default: production
      force_build:
        description: Force build even if tags may already exist
        required: false
        type: string
        default: 'false'
      base_image_default:
        description: Base image used by DockerfileModifier
        required: true
        type: string
      ghcr_repo:
        description: GHCR repository
        required: true
        type: string
      dockerhub_repo:
        description: Docker Hub repository
        required: true
        type: string
      default_platforms:
        description: Build platforms (informational — actual platforms defined in matrix)
        required: true
        type: string
      export_cache_concurrency:
        description: Buildx export cache concurrency
        required: false
        type: string
        default: '4'
      export_layers_concurrency:
        description: Buildx export layers concurrency
        required: false
        type: string
        default: '4'
      buildkit_step_log_max_size:
        description: BuildKit step log max size
        required: false
        type: string
        default: '50000000'
      buildkit_step_log_max_speed:
        description: BuildKit step log max speed
        required: false
        type: string
        default: '100000000'
      buildkit_progress:
        description: BuildKit progress mode
        required: false
        type: string
        default: plain
      docker_buildkit_inline_cache:
        description: BuildKit inline cache
        required: false
        type: string
        default: '1'
      runner_version:
        description: 'GitHub Actions runner version (e.g. ubuntu-24.04). ARM derived as {version}-arm.'
        required: false
        type: string
        default: 'ubuntu-24.04'
    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username
        required: true
      DOCKERHUB_TOKEN:
        description: Docker Hub token
        required: true

permissions:
  contents: read
  packages: write

jobs:
  # ── Prepare cross-product matrix: versions × platforms ──
  prepare-matrix:
    name: Prepare build matrix
    timeout-minutes: 10
    runs-on: ${{ inputs.runner_version || 'ubuntu-latest' }}
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      versions: ${{ steps.generate.outputs.versions }}
    steps:
      - name: Generate version × platform matrix
        id: generate
        shell: bash
        env:
          INPUT_VERSIONS_JSON: ${{ inputs.versions_json }}
          INPUT_RUNNER_VERSION: ${{ inputs.runner_version || 'ubuntu-24.04' }}
          INPUT_DEFAULT_PLATFORMS: ${{ inputs.default_platforms }}
        run: |
          set -euo pipefail

          VERSIONS_JSON="$INPUT_VERSIONS_JSON"
          RUNNER_BASE="$INPUT_RUNNER_VERSION"
          REQUESTED_PLATFORMS="$INPUT_DEFAULT_PLATFORMS"

          # Platform → runner affinity lookup table
          # Format: platform|runner_suffix|slug
          # Runner affinity: ARM32 → ARM64 runner (native compat),
          # i386 → amd64 (native compat), others → amd64 (QEMU)
          PLATFORM_MAP="
          linux/amd64||amd64
          linux/arm64|-arm|arm64
          linux/arm/v7|-arm|armv7
          linux/arm/v6|-arm|armv6
          linux/riscv64|-riscv|riscv64
          linux/386||386
          linux/s390x||s390x
          linux/ppc64le||ppc64le
          linux/mips64le||mips64le
          "

          # Build platform JSON array from DEFAULT_PLATFORMS using the lookup table
          PLATFORMS="["
          first=true
          IFS=',' read -ra REQUESTED <<< "$REQUESTED_PLATFORMS"
          for req in "${REQUESTED[@]}"; do
            req="$(echo "$req" | xargs)"
            [[ -z "$req" ]] && continue
            matched=false
            while IFS='|' read -r plat suffix slug; do
              plat="$(echo "$plat" | xargs)"
              [[ -z "$plat" ]] && continue
              if [[ "$req" == "$plat" ]]; then
                $first || PLATFORMS="${PLATFORMS},"
                first=false
                PLATFORMS="${PLATFORMS}
            {\"platform\":\"${plat}\",\"runner\":\"${RUNNER_BASE}${suffix}\",\"slug\":\"${slug}\"}"
                matched=true
                break
              fi
            done <<< "$PLATFORM_MAP"
            if [[ "$matched" == "false" ]]; then
              echo "::warning::Unknown platform '$req' — skipping (not in affinity table)"
            fi
          done
          PLATFORMS="${PLATFORMS}
          ]"

          echo "Platforms: $(echo "$PLATFORMS" | jq -c '[ .[].platform ]')"

          # Cross-product: each version × each platform
          MATRIX=$(echo "$VERSIONS_JSON" | jq -c --argjson platforms "$PLATFORMS" '
            [.[] as $v | $platforms[] as $p | {
              version: $v.version,
              image_tag: $v.image_tag,
              promote_latest: $v.promote_latest,
              platform: $p.platform,
              runner: $p.runner,
              slug: $p.slug
            }]
          ')

          # Deduplicated version list for merge job
          VERSIONS=$(echo "$VERSIONS_JSON" | jq -c '[.[] | {version, image_tag, promote_latest}]')

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          echo "versions={\"include\":$VERSIONS}" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$MATRIX" | jq length)
          echo "Generated $COUNT build jobs (versions × platforms)"

  # ── Per-platform build (native or QEMU-emulated) ──
  build-platform:
    name: Build ${{ matrix.version }} (${{ matrix.slug }})
    timeout-minutes: 180
    needs: [prepare-matrix]
    runs-on: ${{ matrix.runner }}
    concurrency:
      group: build-${{ matrix.version }}-${{ matrix.slug }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix || '{"include":[]}') }}

    steps:
      - name: Sanitize inputs (trim whitespace)
        id: sanitize
        shell: bash
        env:
          INPUT_GHCR_REPO: ${{ inputs.ghcr_repo }}
          INPUT_DOCKERHUB_REPO: ${{ inputs.dockerhub_repo }}
          INPUT_BASE_IMAGE_DEFAULT: ${{ inputs.base_image_default }}
        run: |
          set -euo pipefail
          trim() { local v="$*"; v="${v#"${v%%[![:space:]]*}"}"; v="${v%"${v##*[![:space:]]}"}" ; printf '%s' "$v"; }
          echo "ghcr_repo=$(trim "$INPUT_GHCR_REPO")" >> "$GITHUB_OUTPUT"
          echo "dockerhub_repo=$(trim "$INPUT_DOCKERHUB_REPO")" >> "$GITHUB_OUTPUT"
          echo "base_image_default=$(trim "$INPUT_BASE_IMAGE_DEFAULT")" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system compression headers
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev build-essential

      - name: Resolve build profile
        id: profile
        uses: ./.github/actions/resolve-build-profile
        with:
          build_profile: ${{ inputs.build_profile }}

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'true'
          setup_buildx: 'true'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ github.token }}

      - name: Check existing tags
        id: check-existing
        shell: bash
        env:
          INPUT_FORCE_BUILD: ${{ inputs.force_build }}
          SANITIZED_GHCR_REPO: ${{ steps.sanitize.outputs.ghcr_repo }}
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail

          RESULT="$({ FORCE_BUILD="$INPUT_FORCE_BUILD" GHCR_REPO="$SANITIZED_GHCR_REPO" VERSION="$MATRIX_VERSION" bash .github/scripts/check-existing-tags.sh; } )"
          echo "$RESULT"
          SKIP_LINE="$(echo "$RESULT" | awk -F= '/^skip_build=/{print $0}' | tail -n1)"
          if [[ -z "$SKIP_LINE" ]]; then
            echo "check-existing-tags did not return skip_build output" >&2
            exit 1
          fi
          echo "$SKIP_LINE" >> "$GITHUB_OUTPUT"

      - name: Generate Dockerfile via DockerfileModifier.sh
        if: steps.check-existing.outputs.skip_build != 'true'
        shell: bash
        env:
          SANITIZED_BASE_IMAGE: ${{ steps.sanitize.outputs.base_image_default }}
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          echo "Using base image: $SANITIZED_BASE_IMAGE"
          mkdir -p resources/build_data
          echo "$SANITIZED_BASE_IMAGE" > ./resources/build_data/base-image
          echo "$MATRIX_VERSION" > ./resources/build_data/version
          touch ./resources/build_data/build
          bash ./DockerfileModifier.sh
          test -f ./Dockerfile.vllm-cpu

      - name: Build and push by digest
        id: build
        if: steps.check-existing.outputs.skip_build != 'true'
        timeout-minutes: 120
        env:
          BUILDKIT_STEP_LOG_MAX_SIZE: ${{ inputs.buildkit_step_log_max_size }}
          BUILDKIT_STEP_LOG_MAX_SPEED: ${{ inputs.buildkit_step_log_max_speed }}
          BUILDKIT_PROGRESS: ${{ inputs.buildkit_progress }}
          DOCKER_BUILDKIT_INLINE_CACHE: ${{ inputs.docker_buildkit_inline_cache }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.vllm-cpu
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.sanitize.outputs.ghcr_repo }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true,${{ steps.profile.outputs.compression_params }},export-cache-concurrency=${{ inputs.export_cache_concurrency }},export-layers-concurrency=${{ inputs.export_layers_concurrency }}
          cache-from: type=gha,scope=vllm-cpu-v4-${{ matrix.version }}-${{ matrix.slug }}
          cache-to: type=gha,scope=vllm-cpu-v4-${{ matrix.version }}-${{ matrix.slug }},mode=max,compression=zstd
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            VLLM_VERSION=${{ matrix.version }}
            BASE_IMAGE=${{ steps.sanitize.outputs.base_image_default }}
          provenance: false
          sbom: false

      - name: Export digest
        if: steps.check-existing.outputs.skip_build != 'true'
        shell: bash
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          MATRIX_SLUG: ${{ matrix.slug }}
        run: |
          mkdir -p /tmp/digests
          digest="$BUILD_DIGEST"
          echo "Platform $MATRIX_SLUG digest: $digest"
          echo "$digest" > "/tmp/digests/$MATRIX_SLUG"

      - name: Upload digest
        if: steps.check-existing.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.version }}-${{ matrix.slug }}
          path: /tmp/digests/${{ matrix.slug }}
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into multi-arch manifest ──
  merge-manifest:
    name: Merge ${{ matrix.version }}
    timeout-minutes: 30
    needs: [prepare-matrix, build-platform]
    if: ${{ !cancelled() && needs.prepare-matrix.result == 'success' }}
    runs-on: ${{ inputs.runner_version || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.versions || '{"include":[]}') }}

    steps:
      - name: Sanitize inputs
        id: sanitize
        shell: bash
        env:
          INPUT_GHCR_REPO: ${{ inputs.ghcr_repo }}
          INPUT_DOCKERHUB_REPO: ${{ inputs.dockerhub_repo }}
        run: |
          set -euo pipefail
          trim() { local v="$*"; v="${v#"${v%%[![:space:]]*}"}"; v="${v%"${v##*[![:space:]]}"}" ; printf '%s' "$v"; }
          echo "ghcr_repo=$(trim "$INPUT_GHCR_REPO")" >> "$GITHUB_OUTPUT"
          echo "dockerhub_repo=$(trim "$INPUT_DOCKERHUB_REPO")" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'true'
          setup_buildx: 'true'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ github.token }}

      - name: Download all platform digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.version }}-*
          merge-multiple: true

      - name: Create multi-arch manifest and push tags
        shell: bash
        env:
          SANITIZED_GHCR_REPO: ${{ steps.sanitize.outputs.ghcr_repo }}
          SANITIZED_DOCKERHUB_REPO: ${{ steps.sanitize.outputs.dockerhub_repo }}
          MATRIX_VERSION: ${{ matrix.version }}
          MATRIX_IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          set -euo pipefail

          GHCR_REPO="$SANITIZED_GHCR_REPO"
          DH_REPO="$SANITIZED_DOCKERHUB_REPO"
          VERSION="$MATRIX_VERSION"
          IMAGE_TAG="$MATRIX_IMAGE_TAG"

          echo "Merging platform digests for $VERSION"

          # Skip if no digests (all builds were skipped — tags already exist)
          if [[ ! -d /tmp/digests ]] || [[ -z "$(ls -A /tmp/digests/ 2>/dev/null)" ]]; then
            echo "No digests found — all builds were skipped (tags already exist)"
            exit 0
          fi

          ls -la /tmp/digests/

          # Collect all digest sources
          SOURCES=""
          for f in /tmp/digests/*; do
            DIGEST="$(cat "$f")"
            SLUG="$(basename "$f")"
            echo "  $SLUG: $DIGEST"
            SOURCES+="${GHCR_REPO}@${DIGEST} "
          done

          if [[ -z "$SOURCES" ]]; then
            echo "No digests found — skipping manifest merge"
            exit 0
          fi

          echo "Creating multi-arch manifest with tags:"
          echo "  GHCR: $GHCR_REPO:$VERSION, $GHCR_REPO:$IMAGE_TAG"
          echo "  DH:   $DH_REPO:$VERSION, $DH_REPO:$IMAGE_TAG"

          # Create manifest list with all tags (GHCR + Docker Hub)
          docker buildx imagetools create \
            -t "${GHCR_REPO}:${VERSION}" \
            -t "${GHCR_REPO}:${IMAGE_TAG}" \
            -t "${DH_REPO}:${VERSION}" \
            -t "${DH_REPO}:${IMAGE_TAG}" \
            $SOURCES

          echo "Multi-arch manifest created successfully"

      - name: Verify Docker Hub parity (fallback sync)
        uses: ./.github/actions/registry-sync
        with:
          dockerhub_repo: ${{ steps.sanitize.outputs.dockerhub_repo }}
          ghcr_repo: ${{ steps.sanitize.outputs.ghcr_repo }}
          tags: ${{ matrix.image_tag }},${{ matrix.version }}
